<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 120" fill="none">
  <defs>
    <!-- Clip aperture elements to the lens circle -->
    <clipPath id="lensClip">
      <circle cx="56" cy="70" r="30"/>
    </clipPath>
  </defs>

  <!-- ═══════════════════════════
       CAMERA BODY OUTLINE
  ═══════════════════════════ -->

  <!-- Main body rectangle -->
  <rect x="4" y="30" width="104" height="80" rx="8"
        stroke="#111111" stroke-width="4.5" fill="none"/>

  <!-- Pentaprism bump on top (arch shape) -->
  <path d="M 26 30 L 26 17 Q 26 12 31 12 L 77 12 Q 82 12 82 17 L 82 30"
        stroke="#111111" stroke-width="4.5"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Viewfinder window (small rect, top-right of body) -->
  <rect x="82" y="19" width="16" height="12" rx="3"
        stroke="#111111" stroke-width="3.5" fill="none"/>


  <!-- ═══════════════════════════
       RED APERTURE / LENS
  ═══════════════════════════ -->

  <g clip-path="url(#lensClip)">
    <!-- Dark-red background fill -->
    <circle cx="56" cy="70" r="30" fill="#990000"/>

    <!-- 6 aperture blades: each is an ellipse offset 14px above aperture
         center, rotated 0°/60°/120°/180°/240°/300° around center (56,70).
         The overlap of 6 bright-red petals creates the iris-blade pattern. -->
    <ellipse cx="56" cy="56" rx="9" ry="14" fill="#CC1111"/>
    <ellipse cx="56" cy="56" rx="9" ry="14" fill="#CC1111" transform="rotate(60  56 70)"/>
    <ellipse cx="56" cy="56" rx="9" ry="14" fill="#CC1111" transform="rotate(120 56 70)"/>
    <ellipse cx="56" cy="56" rx="9" ry="14" fill="#CC1111" transform="rotate(180 56 70)"/>
    <ellipse cx="56" cy="56" rx="9" ry="14" fill="#CC1111" transform="rotate(240 56 70)"/>
    <ellipse cx="56" cy="56" rx="9" ry="14" fill="#CC1111" transform="rotate(300 56 70)"/>

    <!-- Center hub (aperture opening) -->
    <circle cx="56" cy="70" r="5" fill="#660000"/>
  </g>


  <!-- ═══════════════════════════
       CAR SILHOUETTE (black)
       Sports sedan facing right.
       x: 18–93  y: 56(roof)–83(floor)
  ═══════════════════════════ -->
  <path fill="#111111" d="
    M 18,83
    L 18,76
    C 20,67 24,62 30,59
    C 36,57 42,56 50,56
    C 56,55 62,56 68,58
    C 72,60 76,63 78,66
    L 82,66
    C 86,66 90,69 92,75
    L 93,83
    L 86,83
    A 8,8 0 0,0 70,83
    L 46,83
    A 8,8 0 0,0 30,83
    Z
  "/>


  <!-- ═══════════════════════════
       WORDMARK
  ═══════════════════════════ -->
  <text x="124" y="83"
        font-family="'Arial Black', 'Arial', 'Helvetica Neue', Helvetica, sans-serif"
        font-weight="900"
        font-size="52"
        fill="#111111">Auto</text>
  <text x="283" y="83"
        font-family="'Arial Black', 'Arial', 'Helvetica Neue', Helvetica, sans-serif"
        font-weight="900"
        font-size="52"
        fill="#CC0000">Studio</text>
</svg>

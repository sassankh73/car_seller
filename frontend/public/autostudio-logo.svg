<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 40" fill="none">
  <!-- Camera shutter aperture behind car -->
  <g opacity="0.85">
    <circle cx="20" cy="20" r="14" stroke="#CC2020" stroke-width="1.5" fill="none"/>
    <!-- Shutter blades -->
    <line x1="20" y1="6" x2="20" y2="34" stroke="#CC2020" stroke-width="1" opacity="0.5"/>
    <line x1="20" y1="6" x2="20" y2="34" stroke="#CC2020" stroke-width="1" opacity="0.5" transform="rotate(60 20 20)"/>
    <line x1="20" y1="6" x2="20" y2="34" stroke="#CC2020" stroke-width="1" opacity="0.5" transform="rotate(120 20 20)"/>
    <!-- Inner aperture -->
    <circle cx="20" cy="20" r="5" stroke="#CC2020" stroke-width="1.2" fill="#CC2020" opacity="0.2"/>
  </g>
  <!-- Car silhouette -->
  <g fill="#CC2020">
    <!-- Body -->
    <path d="M7 23 C7 23 9 19 13 17 L17 16 L21 13 L27 13 L30 16 L33 17 C33 17 35 19 35 23 L33 24 L7 24 Z"/>
    <!-- Roof -->
    <path d="M14 17 L17 13 L27 13 L30 17 Z" opacity="0.9"/>
    <!-- Wheels -->
    <circle cx="12" cy="24" r="3.5" fill="#CC2020"/>
    <circle cx="12" cy="24" r="1.8" fill="#0f0f0f"/>
    <circle cx="29" cy="24" r="3.5" fill="#CC2020"/>
    <circle cx="29" cy="24" r="1.8" fill="#0f0f0f"/>
    <!-- Windshield highlight -->
    <path d="M18 16.5 L20.5 14 L25 14 L27.5 16.5 Z" fill="white" opacity="0.15"/>
  </g>
  <!-- Wordmark -->
  <text x="46" y="26" font-family="'Fira Code', monospace" font-weight="600" font-size="18" fill="#FFFFFF" letter-spacing="-0.5">Auto</text>
  <text x="100" y="26" font-family="'Fira Code', monospace" font-weight="600" font-size="18" fill="#CC2020" letter-spacing="-0.5">Studio</text>
</svg>
